<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Formulário</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div>
        <h1><center>Bosch/SENAI </center></h1>
    </div>
    <h2><center>Análise de dados | Programação de Aplicativos</center></h2>

    <hr>

    <h3>Formulário de inscrição</h3>
    <p>Por favor digite seu Nome, email e senha para se cadastrar no nosso site!</p>
    <form id="form">
        <input type="text" placeholder="nome" id="nome">
        <input type="email" placeholder="email" id="email">
        <input type="password" placeholder="senha" id="senha">
        <button type="submit">Registrar</button>
    </form>
    <br>
    
    <table border="1">
        
        <thead>
            <th>Nome</th>
            <th>Email</th>
            <th>Ações</th>
        </thead>
        <tbody id="listaUsuarios">
            
        </tbody>
    </table>
    <br>
    <form method="post" id="formatt">
        <input type="hidden" id="idatt">
        <input type="text" placeholder="nome" id="nomeatt" >
        <input type="email" placeholder="email" id="emailatt">
        <input type="password" placeholder="senha" id="senhaatt">
        <button type="submit">Atualizar</button>
    </form>
    <script src="index.js"></script>
    <br>
    <hr>
</body>
</html>
